version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    install:
      - python3 -m pip install --upgrade pip setuptools
      - python3 -m pip install -r docs/requirements.txt
    build:
      html:
        - cd docs
        - python3 -m sphinx -T -b html -d _build/doctrees -D language=en . $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
