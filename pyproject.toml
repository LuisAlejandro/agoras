[tool.pyright]
typeCheckingMode = "basic"
pythonVersion = "3.10"
venvPath = "."
venv = "virtualenv"
reportMissingImports = "warning"
reportMissingModuleSource = "none"
extraPaths = [
    "packages/common/src",
    "packages/media/src",
    "packages/core/src",
    "packages/platforms/src",
    "packages/cli/src",
]
[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 13

[tool.ruff.lint.isort]
combine-as-imports = true
force-wrap-aliases = true
split-on-trailing-comma = true
known-first-party = ["agoras"]

[tool.pydocstyle]
convention = "pep257"
add-ignore = [
    "D203",
    "D213",
    "D401",
    "D200",
]

[tool.bandit]
exclude_dirs = ["tests", "scripts", "docs"]
skips = [
    "B101",
    "B105",
    "B106",
    "B110",
    "B112",
    "B310",
    "B311",
]
