name: Code Quality

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened
    branches:
      - develop
  push:
    branches:
      - 'feature/**'
      - 'dependabot/**'

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Semgrep baseline
        id: baseline
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            git fetch origin develop
            echo "sha=$(git merge-base HEAD origin/develop)" >> "$GITHUB_OUTPUT"
          fi

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/ci \
            --config p/python \
            --baseline-commit "${{ steps.baseline.outputs.sha }}" \
            --metrics=off \
            --error
