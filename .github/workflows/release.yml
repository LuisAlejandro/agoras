name: Publish Release

on:
  release:
    types: [published]

concurrency:
  group: publish-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  verify-release-tag:
    name: Verify release tag
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements-dev.txt

      - name: Run lint
        run: tox -e lint

      - name: Run unit tests
        run: tox -e coverage

  build-packages:
    name: Build Package ${{ matrix.package }}
    runs-on: ubuntu-24.04
    needs: verify-release-tag
    strategy:
      matrix:
        package:
          - common

          - media

          - core

          - platforms

          - cli

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python3 -m pip install build twine

      - name: Build package
        run: |
          cd packages/${{ matrix.package }}
          python3 -m build

      - name: Check package
        run: |
          cd packages/${{ matrix.package }}
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist/*
          retention-days: 90

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: build-packages
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Display structure of downloaded files
        run: ls -R dist/

      - name: Publish common
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/dist-common/

      - name: Wait for common to be available on PyPI
        run: |
          echo "Waiting 30 seconds for package to be indexed on PyPI..."
          sleep 30

      - name: Publish media
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/dist-media/

      - name: Wait for media to be available on PyPI
        run: |
          echo "Waiting 30 seconds for package to be indexed on PyPI..."
          sleep 30

      - name: Publish core
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/dist-core/

      - name: Wait for core to be available on PyPI
        run: |
          echo "Waiting 30 seconds for package to be indexed on PyPI..."
          sleep 30

      - name: Publish platforms
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/dist-platforms/

      - name: Wait for platforms to be available on PyPI
        run: |
          echo "Waiting 30 seconds for package to be indexed on PyPI..."
          sleep 30

      - name: Publish cli
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/dist-cli/

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |

            dist/dist-common/*

            dist/dist-media/*

            dist/dist-core/*

            dist/dist-platforms/*

            dist/dist-cli/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-readthedocs:
    name: Trigger ReadTheDocs Build
    runs-on: ubuntu-24.04
    needs: publish-to-pypi
    steps:
      - name: Trigger ReadTheDocs webhook
        env:
          RTD_WEBHOOK_URL: ${{ secrets.RTD_WEBHOOK_URL }}
          RTD_WEBHOOK_TOKEN: ${{ secrets.RTD_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$RTD_WEBHOOK_URL" ] || [ -z "$RTD_WEBHOOK_TOKEN" ]; then
            echo "ReadTheDocs webhook secrets RTD_WEBHOOK_URL and RTD_WEBHOOK_TOKEN must be configured"
            exit 1
          fi
          curl -f -X POST \
            -d "branches=${{ github.event.release.tag_name }}" \
            -d "token=$RTD_WEBHOOK_TOKEN" \
            "$RTD_WEBHOOK_URL"
          echo "Triggered ReadTheDocs build for version ${{ github.event.release.tag_name }}"
